<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <title>Lab 5 - Registration Page</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <style>

    h1 {
      text-align: center;
    }

    h2 {
      margin-top: 20px;
    }

    #registration-result {
      display: none;
    }

    .result-box {
      background-color: #f8f9fa;
      border-left: 4px solid #198754;
      padding: 20px;
      border-radius: 6px;
    }

    .error-box {
      background-color: #fff5f5;
      border-left: 4px solid #dc3545;
      padding: 20px;
      border-radius: 6px;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Lab 5 - Registration Page</h1>

    <p class="text-center">Create Your Account</p>

    <hr>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="navbar-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="lab3.html">Lab 3</a>
        <a class="nav-link" href="lab4.html">Lab 4</a>
        <a class="nav-link active" href="lab5.html">Lab 5</a>
        <a class="nav-link" href="lab6.html">Lab 6</a>
      </div>
    </nav>

    <hr>

    <h2>Register</h2>

    <p>Fill out the form below to create your account. All fields are required. Your password must contain at least one special character (<code>!</code> or <code>?</code>).</p>

    <div class="row">
      <div class="col-md-6">

        <div class="mb-3">
          <label for="firstName" class="form-label">First Name</label>
          <input type="text" class="form-control" id="firstName" placeholder="Enter your first name">
        </div>

        <div class="mb-3">
          <label for="lastName" class="form-label">Last Name</label>
          <input type="text" class="form-control" id="lastName" placeholder="Enter your last name">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="text" class="form-control" id="email" placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password">
          <div class="form-text">Must contain at least one <code>!</code> or <code>?</code>.</div>
        </div>

        <div class="mb-3">
          <label for="dob" class="form-label">Date of Birth</label>
          <input type="date" class="form-control" id="dob">
        </div>

        <button class="btn btn-success" onclick="register()">Register</button>

      </div>
    </div>

    <hr>

    <!-- Registration Result -->
    <div id="registration-result">

      <h2 id="result-heading"></h2>

      <div id="result-content"></div>

    </div>

    <hr>

    <p>March 19, 2026 – John Scalici</p>

  </div>

  <script>

    function register() {

      // --- Read inputs ---
      const firstName = document.getElementById("firstName").value.trim();
      const lastName  = document.getElementById("lastName").value.trim();
      const email     = document.getElementById("email").value.trim();
      const password  = document.getElementById("password").value;
      const dob       = document.getElementById("dob").value;

      const resultDiv     = document.getElementById("registration-result");
      const resultHeading = document.getElementById("result-heading");
      const resultContent = document.getElementById("result-content");

      // --- Validate: all fields present ---
      if (!firstName || !lastName || !email || !password || !dob) {
        resultHeading.textContent = "Registration Failed";
        resultContent.innerHTML = `
          <div class="error-box">
            <p class="fs-5 fw-semibold text-danger">⚠️ All fields are required.</p>
            <p class="mb-0">Please go back and fill out every field before submitting.</p>
          </div>`;
        resultDiv.style.display = "block";
        resultDiv.scrollIntoView({ behavior: 'smooth' });
        return;
      }

      // --- Validate: password must contain ! or ? ---
      if (!password.includes("!") && !password.includes("?")) {
        resultHeading.textContent = "Registration Failed";
        resultContent.innerHTML = `
          <div class="error-box">
            <p class="fs-5 fw-semibold text-danger">⚠️ Invalid Password.</p>
            <p class="mb-0">Your password must contain at least one special character: <code>!</code> or <code>?</code>.</p>
          </div>`;
        resultDiv.style.display = "block";
        resultDiv.scrollIntoView({ behavior: 'smooth' });
        return;
      }

      // --- Build user object ---
      const user = {
        firstName: firstName,
        lastName:  lastName,
        email:     email,
        password:  password,
        dob:       dob
      };

      // --- Mask password ---
      const maskedPassword = "*".repeat(user.password.length);

      // --- Format date of birth ---
      const dobFormatted = new Date(user.dob + "T00:00:00").toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      // --- Display success ---
      resultHeading.textContent = "Registration Successful!";
      resultContent.innerHTML = `
        <div class="result-box">
          <p class="fs-5 fw-semibold text-success">✅ Welcome, ${user.firstName} ${user.lastName}! Your account has been created.</p>

          <table class="table table-bordered mt-3">
            <tbody>
              <tr>
                <th scope="row">First Name</th>
                <td>${user.firstName}</td>
              </tr>
              <tr>
                <th scope="row">Last Name</th>
                <td>${user.lastName}</td>
              </tr>
              <tr>
                <th scope="row">Email Address</th>
                <td>${user.email}</td>
              </tr>
              <tr>
                <th scope="row">Password</th>
                <td>${maskedPassword}</td>
              </tr>
              <tr>
                <th scope="row">Date of Birth</th>
                <td>${dobFormatted}</td>
              </tr>
            </tbody>
          </table>

          <p class="text-muted mb-0">Thank you for registering! 🎉</p>
        </div>`;

      resultDiv.style.display = "block";
      resultDiv.scrollIntoView({ behavior: 'smooth' });
    }

  </script>

</body>

</html>
